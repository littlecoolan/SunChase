<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunChase — Global Sunshine Map</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root {
  --sun:#FFD166; --cloud:#A8C4D0; --rain:#4A7FA5; --storm:#2C4A6E;
  --bg:#0A0F1A; --bg2:#0F1825; --border:rgba(255,255,255,0.07);
  --text:#E8EFF5; --muted:#6B8599;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-mark{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:var(--sun);}
.logo-tag{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-left:10px;}
.hdr-right{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--muted);}
.pulse-badge{display:flex;align-items:center;gap:6px;padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:10px;letter-spacing:.1em;}
.pulse{width:6px;height:6px;border-radius:50%;background:#4ADE80;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.lang-btn{padding:4px 11px;background:transparent;border:1px solid var(--border);border-radius:20px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;
  cursor:pointer;transition:all .2s;}
.lang-btn:hover,.lang-btn.active{color:var(--sun);border-color:rgba(255,209,102,.3);}

.main{display:grid;grid-template-columns:1fr 300px;flex:1;min-height:0;}
.map-wrap{position:relative;overflow:hidden;background:var(--bg2);}
#map-svg{width:100%;height:100%;cursor:grab;display:block;}
#map-svg:active{cursor:grabbing;}

/* GeoJSON styles */
.land{fill:#1D3755;stroke:#3A6892;stroke-width:.6px;}
.country-border{fill:none;stroke:#243550;stroke-width:.25px;}
.cn-prov{fill:#1e2f46;stroke:#2D4060;stroke-width:.3px;transition:fill .5s;}

/* Pins */
.pin-group{cursor:pointer;}

/* City name: hidden by default, shown on zoom */
.pin-name{
  font-family:'DM Mono',monospace;
  fill:rgba(232,239,245,.88);
  paint-order:stroke;stroke:#0A0F1A;stroke-width:2px;stroke-linejoin:round;
  pointer-events:none;
  display:none;
}
.pin-temp-label{pointer-events:none;}

/* Tier visibility */
.tier-2,.tier-3{display:none;}
.zoom-med .tier-2{display:block;}
.zoom-high .tier-2,.zoom-high .tier-3{display:block;}

/* Show name label when zoomed in enough */
.zoom-med  .pin-name{display:block;}
.zoom-high .pin-name{display:block;}

/* Controls */
.map-controls{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:6px;z-index:20;}
.map-btn{padding:7px 13px;background:rgba(10,15,26,.9);border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;
  cursor:pointer;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(8px);}
.map-btn:hover,.map-btn.active{color:var(--sun);border-color:rgba(255,209,102,.3);}
.zoom-row{display:flex;gap:4px;}
.zoom-row .map-btn{flex:1;font-size:15px;padding:5px 0;text-align:center;letter-spacing:0;}

.season-bar{position:absolute;bottom:14px;left:14px;padding:9px 15px;
  background:rgba(10,15,26,.9);border:1px solid var(--border);border-radius:8px;
  backdrop-filter:blur(8px);z-index:20;}
.season-label{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;}
.season-val{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;color:var(--sun);}

/* Loading */
.loading{position:absolute;inset:0;background:var(--bg2);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:50;transition:opacity .5s;}
.loading.hidden{opacity:0;pointer-events:none;}
.load-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--sun);
  animation:flicker 1.5s ease-in-out infinite;}
.load-sub{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.55}}

/* Tooltip desktop */
.tooltip{position:absolute;background:rgba(10,15,26,.96);border:1px solid var(--border);
  border-radius:10px;padding:13px 17px;font-size:11px;pointer-events:none;
  z-index:100;display:none;min-width:185px;backdrop-filter:blur(12px);}
.tooltip.vis{display:block;}
.tt-city{font-family:'Instrument Serif',serif;font-style:italic;font-size:17px;margin-bottom:6px;}
.tt-row{display:flex;justify-content:space-between;color:var(--muted);margin-top:4px;}
.tt-row span:last-child{color:var(--text);}

/* Tooltip mobile */
.tooltip-m{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
  background:rgba(10,15,26,.97);border:1px solid var(--border);border-radius:14px;
  padding:15px 20px;font-size:12px;z-index:500;min-width:210px;max-width:88vw;
  backdrop-filter:blur(16px);display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.tooltip-m.vis{display:block;}
.tm-close{position:absolute;top:9px;right:13px;font-size:18px;color:var(--muted);cursor:pointer;}

/* Sidebar */
.sidebar{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:17px 22px;border-bottom:1px solid var(--border);}
.sb-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:19px;margin-bottom:3px;}
.sb-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.scope-tabs{display:flex;padding:12px 22px 8px;gap:6px;}
.scope-tab{flex:1;padding:7px 4px;background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;
  cursor:pointer;transition:all .18s;text-align:center;}
.scope-tab:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.scope-tab.active{background:rgba(255,209,102,.12);color:var(--sun);border-color:rgba(255,209,102,.4);font-weight:500;}
.tabs{display:flex;padding:4px 22px 12px;gap:5px;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:5px 2px;border:1px solid var(--border);border-radius:5px;background:transparent;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;transition:all .18s;text-align:center;}
.tab:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.tab.active{background:var(--sun);color:#0A0F1A;border-color:var(--sun);font-weight:500;}
.city-list{flex:1;overflow-y:auto;padding:10px 22px;}
.city-list::-webkit-scrollbar{width:2px;}
.city-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.city-card{padding:11px 13px;border:1px solid var(--border);border-radius:7px;margin-bottom:6px;
  cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.city-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px;}
.city-card.sunny::before{background:var(--sun)}.city-card.cloudy::before{background:var(--cloud)}
.city-card.rainy::before{background:var(--rain)}.city-card.stormy::before{background:var(--storm)}
.city-card:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.03);transform:translateX(2px);}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.card-left{display:flex;align-items:center;gap:6px;}
.card-rank{font-size:10px;width:15px;text-align:right;font-weight:500;}
.card-name{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;}
.card-en{font-size:9px;color:var(--muted);margin-left:3px;}
.card-temp{font-size:16px;font-weight:300;}
.card-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}
.sbar{display:flex;gap:2px;align-items:center;}
.sseg{width:11px;height:3px;border-radius:2px;background:var(--border);}
.sseg.on{background:var(--sun);}
.legend{padding:13px 22px;border-top:1px solid var(--border);}
.legend-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>

<header>
  <div>
    <span class="logo-mark">SunChase</span>
    <span class="logo-tag">Global Sunshine Index for Nomads</span>
  </div>
  <div class="hdr-right">
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    <span id="current-date"></span>
    <div class="pulse-badge"><div class="pulse"></div><span id="live-label">实时数据</span></div>
  </div>
</header>

<div class="main">
  <div class="map-wrap" id="map-wrap">
    <div class="loading" id="loading">
      <div class="load-title">Scanning the globe...</div>
      <div class="load-sub" id="load-sub">Loading map</div>
    </div>

    <svg id="map-svg">
      <g id="g-base"></g>
      <g id="g-pins"></g>
    </svg>

    <div class="map-controls">
      <button class="map-btn active" onclick="filterMap('all',this)">All Regions</button>
      <button class="map-btn" onclick="filterMap('sunny',this)">☀ Sunny Only</button>
      <button class="map-btn" onclick="filterMap('mild',this)">○ Mild 15–25°C</button>
      <div class="zoom-row">
        <button class="map-btn" onclick="zoomBy(.6)">＋</button>
        <button class="map-btn" onclick="zoomBy(-.6)">－</button>
        <button class="map-btn" onclick="resetZoom()">⟳</button>
      </div>
    </div>

    <div class="season-bar">
      <div class="season-label">Current Season</div>
      <div class="season-val" id="season-val">—</div>
    </div>

    <div class="tooltip" id="tooltip"></div>
    <div class="tooltip-m" id="tooltip-m">
      <span class="tm-close" onclick="document.getElementById('tooltip-m').classList.remove('vis')">×</span>
      <div id="tm-content"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Top Nomad Spots</div>
      <div class="sb-sub" id="sb-sub">Ranked by sunshine index</div>
    </div>
    <div class="scope-tabs">
      <button class="scope-tab active" onclick="filterScope('global',this)">全球</button>
      <button class="scope-tab" onclick="filterScope('china',this)">🇨🇳 中国</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="filterCond('all',this)">全部</button>
      <button class="tab" onclick="filterCond('sunny',this)">仅晴天</button>
      <button class="tab" onclick="filterCond('mild',this)">温度舒适</button>
      <button class="tab" onclick="filterCond('avoid',this)">避开雨天</button>
    </div>
    <div class="city-list" id="city-list"></div>
    <div class="legend">
      <div class="legend-title">Weather Index</div>
      <div class="legend-grid">
        <div class="legend-item"><div class="ldot" style="background:var(--sun)"></div>Sunny 晴</div>
        <div class="legend-item"><div class="ldot" style="background:var(--cloud)"></div>Cloudy 多云</div>
        <div class="legend-item"><div class="ldot" style="background:var(--rain)"></div>Rainy 雨</div>
        <div class="legend-item"><div class="ldot" style="background:var(--storm)"></div>Storm 雷暴</div>
      </div>
    </div>
  </div>
</div>

// ───────────────────────────────────────────────
//  MAP INIT (D3 + TopoJSON)
// ───────────────────────────────────────────────
async function initMap() {
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const svg = d3.select('#map-svg').attr('width',W).attr('height',H);
  const gBase = d3.select('#g-base');
  const gPins = d3.select('#g-pins');

  // 取宽/高两个方向中较大的 scale，确保地图填满容器
  const fitScale = Math.max(W / 6.28, H / 3.28);
  proj = d3.geoNaturalEarth1()
    .scale(fitScale)
    .translate([W/2, H/2]);

  const path = d3.geoPath().projection(proj);

  zoomBeh = d3.zoom()
    .scaleExtent([1, 14])
    .translateExtent([[0, 0], [W, H]])
    .on('zoom', ev => {
      const t = ev.transform;
      gBase.attr('transform', t);
      gPins.attr('transform', t);
      // 反向缩放每个 pin，使其屏幕位置随地图移动，但视觉大小自适应
      const inv = 1 / t.k;
      // 字号随 zoom 增大，用 pow(k, 0.55) 保证增速适中（k=1→5px, k=4→11px, k=14→18px）
      const iconSize = Math.max(18, Math.min(32, 18 * Math.pow(t.k, 0.4)));
      const nameSize = Math.max(8,  Math.min(20, 8  * Math.pow(t.k, 0.5)));
      document.querySelectorAll('.pin-group').forEach(p => {
        const x = +p.dataset.x, y = +p.dataset.y;
        p.setAttribute('transform', `translate(${x},${y}) scale(${inv})`);
      });
      document.querySelectorAll('.pin-name').forEach(el => {
        el.style.fontSize = nameSize + 'px';
        el.setAttribute('y', -(iconSize / 2 + 5));
      });
      document.querySelectorAll('.pin-temp-label').forEach(el => {
        el.style.fontSize = iconSize + 'px';
      });
      const pEl = document.getElementById('g-pins');
      pEl.classList.remove('zoom-med','zoom-high');
      if      (t.k >= 3)   pEl.classList.add('zoom-high');
      else if (t.k >= 1.8) pEl.classList.add('zoom-med');
    });

  svg.call(zoomBeh)
     .on('dblclick.zoom', null); // disable dbl-click zoom

  // Dismiss mobile tooltip on map background tap
  svg.on('click', e => {
    if (!e.target.closest('.pin-group'))
      document.getElementById('tooltip-m').classList.remove('vis');
  });

  // Ocean background
  gBase.append('path').datum({type:'Sphere'})
    .attr('fill','#0a1a2e').attr('stroke','#1c3a56').attr('stroke-width','1').attr('d',path);
  // Graticule grid
  gBase.append('path').datum(d3.geoGraticule()())
    .attr('stroke','#1a3450').attr('stroke-width','.3').attr('fill','none').attr('d',path);

  document.getElementById('load-sub').textContent = 'Loading world map...';
  try {
    const world = await fetch(
      'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'
    ).then(r => r.json());

    // Merged land mass
    gBase.append('path')
      .datum(topojson.feature(world, world.objects.land))
      .attr('class','land')
      .attr('fill','#1D3755').attr('stroke','none').attr('d', path);

    // Country borders
    gBase.append('path')
      .datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b))
      .attr('fill','none').attr('stroke','#2E5478').attr('stroke-width','.35').attr('d', path);

    // Equator + tropics
    [{lat:23.5,dash:'3 4',op:.4},{lat:-23.5,dash:'3 4',op:.4},{lat:0,dash:'none',op:.7}].forEach(({lat,dash,op}) => {
      gBase.append('path')
        .datum({type:'Feature',geometry:{type:'LineString',coordinates:[[-180,lat],[180,lat]]}})
        .attr('stroke',`rgba(58,104,146,${op})`).attr('stroke-width',lat===0?'.7':'.4')
        .attr('stroke-dasharray',dash).attr('fill','none').attr('d',path);
    });
  } catch(e) {
    console.warn('World atlas load failed, using fallback', e);
    drawFallbackMap(gBase, path);
  }

  renderPins();
  document.getElementById('loading').classList.add('hidden');
}

// Color China provinces by weather condition
function colorProvinces() {
  document.querySelectorAll('.cn-prov').forEach(el => {
    const name = el.getAttribute('data-name') || '';
    const city = cities.filter(c=>c.r==='china').find(c => {
      const prov = c.co.replace(/省|市|自治区|特别行政区/g,'');
      return name.includes(prov) || prov.includes(name.slice(0,2));
    });
    if (city) {
      const hex = COL[city.cond];
      el.style.fill = hex + '22';
    }
  });
}

// ───────────────────────────────────────────────
//  WEATHER API
// ───────────────────────────────────────────────
function wmo(code) {
  if (code<=1) return 'sunny';
  if (code<=3) return 'cloudy';
  if (code<=49) return 'cloudy';
  if (code<=82) return 'rainy';
  return 'stormy';
}

function calcSc(tmp, hum, wnd, cond) {
  let s = 100;
  if (cond==='cloudy') s-=15;
  if (cond==='rainy')  s-=40;
  if (cond==='stormy') s-=60;
  s -= Math.max(0, Math.abs(tmp-22)-4)*2;
  if (hum>65) s -= (hum-65)*.4;
  if (wnd>20)  s -= (wnd-20)*.5;
  return Math.max(5, Math.min(99, Math.round(s)));
}

async function fetchWeather() {
  const CHUNK = 20;
  let done = 0;
  for (let i=0; i<cities.length; i+=CHUNK) {
    const chunk = cities.slice(i, i+CHUNK);
    const lats = chunk.map(c=>c.lat).join(',');
    const lngs = chunk.map(c=>c.lng).join(',');
    try {
      const data = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lngs}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=temperature_2m_max,temperature_2m_min&wind_speed_unit=kmh&timezone=auto`
      ).then(r=>r.json());
      const results = Array.isArray(data) ? data : [data];
      results.forEach((res, idx) => {
        const c = chunk[idx];
        if (!c || !res.current) return;
        const cur = res.current;
        c.cond = wmo(cur.weather_code);
        c.tmp  = Math.round(cur.temperature_2m);
        c.hum  = Math.round(cur.relative_humidity_2m);
        c.wnd  = Math.round(cur.wind_speed_10m);
        c.tmax = res.daily ? Math.round(res.daily.temperature_2m_max[0]) : c.tmp;
        c.tmin = res.daily ? Math.round(res.daily.temperature_2m_min[0]) : c.tmp;
        c.sc   = calcSc(c.tmp, c.hum, c.wnd, c.cond);
        done++;
      });
    } catch(e) { console.warn(e); }
    document.getElementById('load-sub').textContent = `Weather ${Math.round(done/cities.length*100)}%`;
  }
  dataLoaded = true;
  const _t = T[lang];
  document.getElementById('current-date').textContent =
    new Date().toLocaleString(_t.dateLocale,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) + _t.dateSuffix;
}

    if (currentCond==='sunny') return c.cond==='sunny';
    if (currentCond==='mild')  return c.tmp>=15 && c.tmp<=25;
    if (currentCond==='avoid') return c.cond==='rainy' || c.cond==='stormy';
    return true;
  }).sort((a,b)=>b.sc-a.sc);
  const rc = ['var(--sun)','#C0C0C0','#CD7F32'];
  document.getElementById('city-list').innerHTML = list.map((c,i)=>`
    <div class="city-card ${c.cond}" onclick="focusCity('${c.n}')">
      <div class="card-top">
        <div class="card-left">
          <span class="card-rank" style="color:${rc[i]||'var(--muted)'}">${i+1}</span>
          <span style="font-size:12px">${ICN[c.cond]}</span>
          <span class="card-name">${lang==='zh' ? (c.zh||c.n) : (c.en||c.n)}</span>
          ${(c.zh||c.en)?`<span class="card-en">${lang==='zh' ? (c.en||c.n) : (c.zh||c.n)}</span>`:''}
        </div>
        <span class="card-temp" style="color:${COL[c.cond]}">${c.tmp}°</span>
      </div>
      <div class="card-meta">
        <span>${lang==='zh'?(c.coZh||c.co):c.co} · ${T[lang].cond[c.cond]}</span>
        <div style="display:flex;align-items:center;gap:5px">
          ${sbar(c.sc)}<span style="color:${COL[c.cond]}">${c.sc}</span>
        </div>
      </div>
    </div>`).join('');
}

function filterScope(scope, btn) {
  document.querySelectorAll('.scope-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentScope = scope;
  document.querySelectorAll('.pin-group').forEach(p=>{
    const c = cities.find(x=>x.n===p.dataset.city);
    if (!c) return;
    p.style.opacity = scope==='china' ? (c.r==='china'?'1':'0.07') : '1';
  });
  updateSbSub();
  renderCities();
}

function filterCond(cond, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentCond = cond;
  updateSbSub();
  renderCities();
}

function updateSbSub() {
  const t = T[lang];
  const scopePfx = currentScope==='china' ? (lang==='zh'?'中国 · ':'China · ') : '';
  document.getElementById('sb-sub').textContent = scopePfx + (t.fl[currentCond]||'');
}

function filterMap(type, btn) {
  document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pin-group').forEach(p=>{
    const c = cities.find(x=>x.n===p.dataset.city);
    if (!c) return;
    let show = type==='all' || (type==='sunny'&&c.cond==='sunny') || (type==='mild'&&c.tmp>=15&&c.tmp<=25);
    p.style.opacity = show ? '1' : '0.08';
  });
}

// ───────────────────────────────────────────────
//  TOOLTIP
// ───────────────────────────────────────────────
const isTouch = ()=>window.matchMedia('(pointer:coarse)').matches;

function tipHTML(c) {
  const t = T[lang];
  const cityName = lang==='zh' ? (c.zh||c.n) : (c.en||c.n);
  const citySub  = lang==='zh' ? (c.en||null) : (c.zh||null);
  return `<div class="tt-city" style="color:${COL[c.cond]}">${ICN[c.cond]} ${cityName}${citySub?` <span style="font-size:11px;opacity:.6">${citySub}</span>`:''}</div>
    <div class="tt-row"><span>${t.ttWeather}</span><span>${t.cond[c.cond]}</span></div>
    <div class="tt-row"><span>${t.ttTemp}</span><span>${c.tmin}° – ${c.tmax}°C</span></div>
    <div class="tt-row"><span>${t.ttScore}</span><span style="color:${COL[c.cond]}">${c.sc}/100</span></div>
    ${!dataLoaded?`<div style="font-size:9px;color:var(--muted);margin-top:5px">${t.ttLoading}</div>`:''}`;
}

function showTip(e, name) {
  const c = cities.find(x=>x.n===name);
  if (!c) return;
  if (isTouch()) {
    document.getElementById('tm-content').innerHTML = tipHTML(c);
    document.getElementById('tooltip-m').classList.add('vis');
    return;
  }
  const tip = document.getElementById('tooltip');
  tip.innerHTML = tipHTML(c);
  const wr = document.getElementById('map-wrap').getBoundingClientRect();
  let lx = e.clientX - wr.left + 14, ly = e.clientY - wr.top - 20;
  if (lx+210>wr.width)  lx -= 220;
  if (ly+200>wr.height) ly -= 200;
  tip.style.left = lx+'px'; tip.style.top = ly+'px';
  tip.classList.add('vis');
}

function hideTip() { document.getElementById('tooltip').classList.remove('vis'); }

function focusCity(name) {
  const c = cities.find(x=>x.n===name);
  if (!c || !proj) return;
  const [px,py] = proj([c.lng,c.lat]);
  const wr = document.getElementById('map-wrap');
  const sc = 5, tx = wr.clientWidth/2 - sc*px, ty = wr.clientHeight/2 - sc*py;
  d3.select('#map-svg').transition().duration(600)
    .call(zoomBeh.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
}

// ───────────────────────────────────────────────
//  ZOOM BUTTONS
// ───────────────────────────────────────────────
function zoomBy(delta) {
  d3.select('#map-svg').transition().duration(220)
    .call(zoomBeh.scaleBy, Math.exp(delta));
}
function resetZoom() {
  d3.select('#map-svg').transition().duration(380)
    .call(zoomBeh.transform, d3.zoomIdentity);
}

// ───────────────────────────────────────────────
//  INIT
// ───────────────────────────────────────────────
function getSeason() {
  const t = T[lang];
  return t.season[new Date().getMonth()] + t.seasonSuffix;
}

function applyLang(l) {
  lang = l;
  const t = T[l];
  document.getElementById('lang-btn').textContent = l==='zh' ? 'EN' : '中';
  document.querySelector('.logo-tag').textContent = t.logoTag;
  document.getElementById('live-label').textContent = t.liveData;
  document.querySelector('.load-title').textContent = t.loadTitle;
  // 地图控制按钮（仅直接子按钮，不含缩放行）
  const mapBtns = document.querySelectorAll('.map-controls > .map-btn');
  if (mapBtns[0]) mapBtns[0].textContent = t.allRegions;
  if (mapBtns[1]) mapBtns[1].textContent = t.sunnyOnly;
  if (mapBtns[2]) mapBtns[2].textContent = t.mildFilter;
  document.querySelector('.season-label').textContent = t.seasonLabel;
  document.getElementById('season-val').textContent = getSeason();
  document.querySelector('.sb-title').textContent = t.sbTitle;
  updateSbSub();
  const scopeTabs = document.querySelectorAll('.scope-tab');
  if (scopeTabs[0]) scopeTabs[0].textContent = t.scopeGlobal;
  if (scopeTabs[1]) scopeTabs[1].textContent = t.scopeChina;
  const tabs = document.querySelectorAll('.tab');
  if (tabs[0]) tabs[0].textContent = t.tabAll;
  if (tabs[1]) tabs[1].textContent = t.tabSunny;
  if (tabs[2]) tabs[2].textContent = t.tabMild;
  if (tabs[3]) tabs[3].textContent = t.tabAvoid;
  document.querySelector('.legend-title').textContent = t.legendTitle;
  const lgColors = ['var(--sun)','var(--cloud)','var(--rain)','var(--storm)'];
  document.querySelector('.legend-grid').innerHTML = t.lgItems.map((label, i) =>
    `<div class="legend-item"><div class="ldot" style="background:${lgColors[i]}"></div>${label}</div>`
  ).join('');
  renderCities();
  renderPins();
}

function toggleLang() { applyLang(lang==='zh' ? 'en' : 'zh'); }

async function init() {
  document.getElementById('current-date').textContent =
    new Date().toLocaleDateString(T[lang].dateLocale,{month:'short',day:'numeric'}) + T[lang].dateLoading;
  document.getElementById('season-val').textContent = getSeason();
  updateSbSub();
  renderCities();
  await initMap();
  await fetchWeather();
  renderPins();
  renderCities();
  colorProvinces();
}

window.addEventListener('resize', () => {
  const wrap = document.getElementById('map-wrap');
  d3.select('#map-svg').attr('width', wrap.clientWidth).attr('height', wrap.clientHeight);
});

init();
</script>
</body>
</html>
